name: 🚴 Cycling Coach Agent 24/7

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # 03:30 AM UTC - Descarga Garmin
    - cron: '30 3 * * *'
    # 07:30 AM UTC - Envía plan
    - cron: '30 7 * * *'
    # 19:00 PM UTC - Análisis sesión
    - cron: '0 19 * * *'
    # Domingo 20:00 UTC - Plan semanal
    - cron: '0 20 * * 0'

jobs:
  run-cycling-coach:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Descargar código
      uses: actions/checkout@v3
    
    - name: 🐍 Configurar Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: 🚴 Ejecutar Agente Ciclismo
      run: python agent_ciclismo_main.py
      env:
        GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
